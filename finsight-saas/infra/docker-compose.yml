version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finsight-postgres
    environment:
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight_dev_password
      POSTGRES_DB: finsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight -d finsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: finsight-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://finsight:finsight_dev_password@postgres/finsight
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX: ${PINECONE_INDEX:-finsight}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OLLAMA_BASE_URL: http://ollama:11434
      APP_ENV: development
      CORS_ORIGINS: '["http://localhost:3000"]'
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend
      - /tmp/finsight_faiss:/tmp/finsight_faiss
    restart: unless-stopped

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: finsight-celery
    command: celery -A backend.core.queue.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://finsight:finsight_dev_password@postgres/finsight
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX: ${PINECONE_INDEX:-finsight}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend
      - /tmp/finsight_faiss:/tmp/finsight_faiss
    restart: unless-stopped

  # ─── Celery Flower (monitoring) ────────────────────────────────────────────
  flower:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: finsight-flower
    command: celery -A backend.core.queue.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379
      APP_ENV: development
    depends_on:
      - redis
    restart: unless-stopped

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: finsight-frontend
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: finsight-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ─── Ollama (LLaMA-3 for Pro plan) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: finsight-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
