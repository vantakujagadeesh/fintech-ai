name: FinSight AI — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/finsight-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/finsight-frontend

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finsight
          POSTGRES_PASSWORD: finsight_test_pass
          POSTGRES_DB: finsight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python / Backend ──────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt
        working-directory: finsight-saas

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://finsight:finsight_test_pass@localhost/finsight_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key
          OPENAI_API_KEY: sk-test-key-not-real
          APP_ENV: development
          PINECONE_API_KEY: ""
          STRIPE_SECRET_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
          LANGCHAIN_API_KEY: ""
          NEWS_API_KEY: ""
          OLLAMA_BASE_URL: http://localhost:11434
        run: pytest backend/tests/ -v --tb=short --asyncio-mode=auto
        working-directory: finsight-saas

      # ── Node / Frontend ───────────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: finsight-saas/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: finsight-saas/frontend

      - name: TypeScript check
        run: npm run type-check
        working-directory: finsight-saas/frontend

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
        working-directory: finsight-saas/frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: finsight-saas/frontend

  # ── Job 2: Build & Deploy ─────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Extract metadata for frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Build and push backend image
      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: finsight-saas
          file: finsight-saas/infra/Dockerfile.backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # Build and push frontend image
      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: finsight-saas
          file: finsight-saas/infra/Dockerfile.frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      # Trigger Railway deployment
      - name: Deploy to Railway (Backend)
        if: ${{ secrets.RAILWAY_BACKEND_WEBHOOK != '' }}
        run: |
          curl --fail -X POST "${{ secrets.RAILWAY_BACKEND_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"image":"${{ env.BACKEND_IMAGE }}:latest"}'

      - name: Deploy to Railway (Frontend)
        if: ${{ secrets.RAILWAY_FRONTEND_WEBHOOK != '' }}
        run: |
          curl --fail -X POST "${{ secrets.RAILWAY_FRONTEND_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"image":"${{ env.FRONTEND_IMAGE }}:latest"}'

      - name: Post deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ env.BACKEND_IMAGE }}\` | \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.FRONTEND_IMAGE }}\` | \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
